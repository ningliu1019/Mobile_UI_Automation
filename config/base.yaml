device:
  # use_named_device: false — custom metrics + Chrome-for-Android UA.
  # "iPhone 12 Pro" (iOS Safari UA) is inconsistent with the Chromium engine
  # and causes Twitch to serve HLS content Chrome can't play. A Chrome-for-Android
  # UA matches the actual engine and reliably gets the mobile player.
  use_named_device: false
  name: "iPhone 12 Pro"   # only used when use_named_device: true

  # Custom device metrics (only used when use_named_device: false)
  width: 390
  height: 844
  pixel_ratio: 3.0
  user_agent: >-
    Mozilla/5.0 (Linux; Android 12; Pixel 6) AppleWebKit/537.36
    (KHTML, like Gecko) Chrome/148.0.0.0 Mobile Safari/537.36

browser:
  headless: false
  explicit_wait: 15
  page_load_timeout: 30
  # implicit_wait is intentionally not set here: driver_factory pins it to 0
  # so explicit WebDriverWait calls are the single source of waiting truth.

# URL and accounts are environment-specific — defined in environments/<env>.yaml
twitch:
  search_query: "StarCraft II"
  scroll_count: 2
  scroll_amount_px: 600       # pixels per scroll action
  scroll_pause_seconds: 0.8
  stream_buffer_seconds: 30   # max wait for the live player to start playing
  video_wait_seconds: 20      # max wait for the <video> element to appear

screenshots:
  directory: "screenshots"
